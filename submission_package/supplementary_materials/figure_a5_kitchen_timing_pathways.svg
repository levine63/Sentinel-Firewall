<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="720" viewBox="0 0 1320 720" role="img" aria-label="Kitchen package timing pathways">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #ffffff; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .label-small { font-size: 25px; }
      .label-med { font-size: 29px; }
      .arrow-label { font-family: Arial, Helvetica, sans-serif; fill: #111111; font-size: 28px; font-style: italic; font-weight: 600; }
      .box-green { fill: #4BA64F; stroke: #2E6E32; stroke-width: 3; }
      .box-blue { fill: #4E88C7; stroke: #275C96; stroke-width: 3; }
      .box-red { fill: #C73C35; stroke: #8F231F; stroke-width: 3; }
      .arrow { stroke: #111111; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="70" y="85" width="235" height="105" rx="2" class="box-green" filter="url(#shadow)"/>
  <text x="187.5" y="137" class="label label-med">Calcium</text>
  <text x="187.5" y="170" class="label label-med">supplementation</text>

  <rect x="70" y="280" width="235" height="105" rx="2" class="box-green" filter="url(#shadow)"/>
  <text x="187.5" y="322" class="label label-med">Safe pot voucher</text>
  <text x="187.5" y="355" class="label label-med">and substitution</text>

  <rect x="70" y="475" width="235" height="105" rx="2" class="box-green" filter="url(#shadow)"/>
  <text x="187.5" y="523" class="label label-med">Safe child</text>
  <text x="187.5" y="556" class="label label-med">utensils</text>

  <ellipse cx="525" cy="145" rx="160" ry="72" class="box-blue" filter="url(#shadow)"/>
  <text x="525" y="126" class="label label-med">Pregnant</text>
  <text x="525" y="160" class="label label-med">woman's BLL</text>

  <ellipse cx="525" cy="340" rx="160" ry="72" class="box-blue" filter="url(#shadow)"/>
  <text x="525" y="321" class="label label-med">Nursing</text>
  <text x="525" y="355" class="label label-med">woman's BLL</text>

  <rect x="1045" y="90" width="215" height="510" rx="2" class="box-red" filter="url(#shadow)"/>
  <text x="1152.5" y="345" class="label label-med">Child blood</text>
  <text x="1152.5" y="379" class="label label-med">lead level</text>
  <text x="1152.5" y="413" class="label label-med">(BLL)</text>

  <line x1="305" y1="137.5" x2="365" y2="137.5" class="arrow"/>
  <line x1="305" y1="332.5" x2="365" y2="180" class="arrow"/>
  <line x1="685" y1="145" x2="1045" y2="145" class="arrow"/>
  <text x="845" y="126" class="arrow-label">in utero</text>

  <line x1="305" y1="332.5" x2="365" y2="332.5" class="arrow"/>
  <line x1="685" y1="340" x2="1045" y2="340" class="arrow"/>
  <text x="820" y="321" class="arrow-label">while nursing</text>

  <line x1="305" y1="362" x2="360" y2="362" class="arrow" opacity="0"/>
  <line x1="305" y1="395" x2="1045" y2="495" class="arrow"/>
  <text x="700" y="445" class="arrow-label">after complementary feeding</text>

  <line x1="305" y1="527.5" x2="1045" y2="562" class="arrow"/>
  <text x="700" y="548" class="arrow-label">after complementary feeding</text>
</svg>
